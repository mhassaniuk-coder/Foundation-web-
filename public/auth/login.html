<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Login — Restored Kings Foundation</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <main class="container auth-container">
    <div class="auth-hero">
      <h1>Restore dignity. Rebuild lives.</h1>
      <p style="opacity:.95; max-width:36rem;">Members get priority access to programs, volunteer opportunities, and events. Secure your account to manage your profile and donations.</p>
      <p style="margin-top:1rem;"><a href="/donate.html" class="btn btn-primary">Donate</a></p>
    </div>

    <aside class="auth-card" aria-labelledby="login-heading">
      <h2 id="login-heading">Welcome back</h2>
      <p style="color:var(--neutral-500); margin-bottom:1rem;">Sign in to your member dashboard</p>
      <form id="loginForm" novalidate>
        <div class="form-row">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" name="email" required placeholder="name@domain.org" autocomplete="email">
        </div>

        <div class="form-row">
          <label for="loginPassword">Password</label>
          <div style="display:flex; gap:.5rem; align-items:center;">
            <input type="password" id="loginPassword" name="password" required placeholder="Enter your password" autocomplete="current-password" style="flex:1;">
            <button type="button" class="show-pass" id="toggleLoginPass" aria-label="Show password">Show</button>
          </div>
        </div>

        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:.25rem;">
          <label style="font-size:.9rem; display:flex; align-items:center; gap:.5rem;"><input type="checkbox" id="rememberMe"> Remember me</label>
          <a href="/auth/reset.html" class="btn btn-outline">Forgot?</a>
        </div>

        <div class="auth-actions" style="margin-top:1rem;">
          <button type="submit" class="btn btn-primary" style="flex:1;">Log In</button>
        </div>

        <div class="social-row">
          <button type="button" class="social-btn" id="socialGoogle">Continue with Google</button>
          <button type="button" class="social-btn" id="socialFacebook">Continue with Facebook</button>
        </div>
      </form>

      <p style="margin-top:1rem; font-size:.95rem;">New here? <a href="/auth/signup.html">Create an account</a></p>
    </aside>
  </main>
  <script src="/js/auth.js"></script>
</body>
</html>
