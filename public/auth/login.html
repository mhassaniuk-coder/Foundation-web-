<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Login — Restored Kings Foundation</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <main class="container" style="max-width:520px; margin:4rem auto;">
    <div class="card">
      <h2>Member Login</h2>
      <form id="loginForm">
        <label>Email</label>
        <input type="email" id="loginEmail" required placeholder="name@domain.org">
        <label>Password</label>
        <input type="password" id="loginPassword" required placeholder="Enter your password">
        <div style="display:flex; gap:.5rem; margin-top:1rem;">
          <button type="submit" class="btn btn-primary">Log In</button>
          <a href="/auth/reset.html" class="btn btn-outline">Forgot?</a>
        </div>
      </form>
      <p style="margin-top:1rem;">Don't have an account? <a href="/auth/signup.html">Create one</a></p>
    </div>
  </main>
  <script src="/js/auth.js"></script>
</body>
</html>
