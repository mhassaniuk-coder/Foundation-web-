<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Sign Up — Restored Kings Foundation</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <main class="container" style="max-width:600px; margin:3rem auto;">
    <div class="card">
      <h2>Create an Account</h2>
      <form id="signupForm">
        <label>Full name</label>
        <input type="text" id="signupName" required placeholder="Your full name">
        <label>Email</label>
        <input type="email" id="signupEmail" required placeholder="name@domain.org">
        <label>Password</label>
        <input type="password" id="signupPassword" required placeholder="Choose a strong password">
        <label>Confirm Password</label>
        <input type="password" id="signupConfirm" required placeholder="Confirm password">
        <div style="margin-top:1rem; display:flex; gap:.5rem;">
          <button class="btn btn-primary" type="submit">Create Account</button>
          <a href="/auth/login.html" class="btn btn-outline">Already have an account?</a>
        </div>
      </form>
    </div>
  </main>
  <script src="/js/auth.js"></script>
</body>
</html>
