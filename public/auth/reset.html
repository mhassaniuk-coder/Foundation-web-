<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Password Reset — Restored Kings Foundation</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <main class="container auth-container">
    <div class="auth-hero">
      <h1>Need a reset?</h1>
      <p style="opacity:.95; max-width:36rem;">We'll send a secure link to your email so you can reset your password safely.</p>
    </div>

    <aside class="auth-card" aria-labelledby="reset-heading">
      <h2 id="reset-heading">Reset Password</h2>
      <form id="resetForm" novalidate>
        <div class="form-row">
          <label for="resetEmail">Email</label>
          <input type="email" id="resetEmail" name="email" required placeholder="name@domain.org" autocomplete="email">
        </div>
        <div style="margin-top:1rem;">
          <button class="btn btn-primary" type="submit">Send Reset Link</button>
        </div>
      </form>
      <p style="margin-top:1rem;"><a href="/auth/login.html">Back to login</a></p>
    </aside>
  </main>
  <script src="/js/auth.js"></script>
</body>
</html>
