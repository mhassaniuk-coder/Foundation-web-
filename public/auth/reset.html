<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Password Reset — Restored Kings Foundation</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <main class="container" style="max-width:520px; margin:4rem auto;">
    <div class="card">
      <h2>Reset Password</h2>
      <form id="resetForm">
        <label>Email</label>
        <input type="email" id="resetEmail" required placeholder="name@domain.org">
        <div style="margin-top:1rem;">
          <button class="btn btn-primary" type="submit">Send Reset Link</button>
        </div>
      </form>
      <p style="margin-top:1rem;"><a href="/auth/login.html">Back to login</a></p>
    </div>
  </main>
  <script src="/js/auth.js"></script>
</body>
</html>
