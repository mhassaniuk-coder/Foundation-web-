<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication | Restored Kings Foundation</title>
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        .auth-gateway {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--primary-900);
            position: relative;
            overflow: hidden;
            padding: 2rem;
        }
        .auth-gateway::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?ixlib=rb-1.2.1&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            filter: brightness(0.2) blur(8px);
            transform: scale(1.1);
        }
        .gateway-card {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 4rem 3rem;
            max-width: 500px;
            width: 100%;
        }
        .gateway-card .logo {
            justify-content: center;
            margin-bottom: 1.5rem;
        }
        .gateway-card h1 {
            color: var(--white);
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }
        .gateway-card p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.125rem;
            margin-bottom: 2.5rem;
        }
        .gateway-actions {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="auth-gateway">
        <div class="gateway-card glass-panel">
            <a href="/" class="logo">
                <div class="logo-icon">♔</div>
                <div class="logo-text">Restored <span>Kings</span></div>
            </a>
            <h1>Welcome to the Kingdom</h1>
            <p>Join a community of men dedicated to growth, honor, and purpose. Access your account or become a member today.</p>
            <div class="gateway-actions">
                <a href="/auth/login.html" class="btn btn-primary btn-lg">Login to Your Account</a>
                <a href="/auth/signup.html" class="btn btn-secondary btn-lg">Become a Member</a>
            </div>
        </div>
    </div>
</body>
</html>
