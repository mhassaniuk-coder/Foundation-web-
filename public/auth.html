<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth Console | Restored Kings Foundation</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="/css/premium.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: var(--primary-900);
            position: relative;
            overflow: hidden;
        }

        .auth-bg {
            position: absolute;
            inset: 0;
            background-image: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?ixlib=rb-1.2.1&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            filter: brightness(0.3) blur(5px);
            z-index: 0;
        }

        .auth-card {
            width: 100%;
            max-width: 450px;
            z-index: 1;
        }

        .auth-tabs {
            display: flex;
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .auth-tab {
            flex: 1;
            padding: 1rem;
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .auth-tab.active {
            color: var(--gold-400);
            border-bottom: 2px solid var(--gold-400);
        }

        .auth-form {
            display: none;
            flex-direction: column;
            gap: 1.5rem;
        }

        .auth-form.active {
            display: flex;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.8rem 1rem;
            border-radius: var(--radius-md);
            color: white;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            border-color: var(--gold-500);
            background: rgba(255, 255, 255, 0.1);
        }

        .social-auth {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        .btn-google {
            width: 100%;
            background: white;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            padding: 0.8rem;
            border-radius: var(--radius-md);
            font-weight: 600;
            margin-top: 1rem;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .btn-google:hover {
            transform: translateY(-2px);
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <div class="auth-bg"></div>
        <div class="auth-card glass-panel" style="padding: 3rem;">
            <div style="text-align: center; margin-bottom: 2rem;">
                <a href="/" class="logo" style="justify-content: center;">
                    <div class="logo-icon">♔</div>
                    <div class="logo-text">Restored <span>Kings</span></div>
                </a>
                <p style="color: rgba(255,255,255,0.6); margin-top: 1rem;">Portal Access Console</p>
            </div>

            <div class="auth-tabs">
                <div class="auth-tab active" data-target="loginForm">Login</div>
                <div class="auth-tab" data-target="registerForm">Join the Kingdom</div>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="auth-form active">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" class="form-input" placeholder="king@restoredkings.org" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" class="form-input" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;">Sign In</button>
                <a href="/auth/reset.html"
                    style="text-align: center; color: var(--gold-400); font-size: 0.875rem;">Forgot
                    Password?</a>
            </form>

            <!-- Register Form -->
            <form id="registerForm" class="auth-form">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" class="form-input" placeholder="Marcus Aurelius" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" class="form-input" placeholder="king@restoredkings.org" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" class="form-input" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;">Create Account</button>
            </form>

            <div class="social-auth">
                <p style="font-size: 0.8rem; color: rgba(255,255,255,0.5);">Or continue with</p>
                <div class="btn-google">
                    <img src="https://www.google.com/favicon.ico" width="20" height="20" alt="Google">
                    Sign in with Google
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="/js/auth.js"></script>
</body>

</html>
